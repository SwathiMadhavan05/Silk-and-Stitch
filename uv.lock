version = 1
requires-python = ">=3.11"

[[package]]
name = "fashion-openenv"
version = "1.0.0"
source = { editable = "." }
dependencies = [
    { name = "fastapi" },
    { name = "uvicorn" },
    { name = "pydantic" },
    { name = "requests" },
    { name = "openenv-core" },
]

[[package]]
name = "fastapi"
version = "0.115.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "uvicorn"
version = "0.34.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "pydantic"
version = "2.10.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "requests"
version = "2.32.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "openenv-core"
version = "0.2.0"
source = { registry = "https://pypi.org/simple" }
